<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adolescent Medicine Clinic – Case Record Form (Follow up)</title>
<style>
  :root{ --ink:#111; --muted:#666; --accent:#1565c0; --bg:#eef1f5; }
  *{box-sizing:border-box;}
  body{ margin:0; background:var(--bg); color:var(--ink);
    font-family:"Calibri","Carlito","Segoe UI",Arial,sans-serif; }

  /* ---- Toolbar (screen only) ---- */
  .toolbar{ position:sticky; top:0; z-index:10;
    display:flex; gap:8px; flex-wrap:wrap; align-items:center;
    background:#fff; border-bottom:1px solid #d4d9e0; padding:10px 16px;
    box-shadow:0 1px 4px rgba(0,0,0,.06); font-size:13px; }
  .toolbar h1{font-size:15px;margin:0 auto 0 0;font-weight:700;color:var(--accent);}
  .toolbar button{ font:inherit; cursor:pointer; border:1px solid #c3cad3;
    background:#f7f9fc; color:#222; padding:7px 14px; border-radius:7px; }
  .toolbar button:hover{background:#eaf1fb;border-color:var(--accent);}
  .toolbar button.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
  .toolbar button.primary:hover{background:#0d4ea0;}

  /* ---- Page sheet = US Letter, 1in margins (matches original docx) ---- */
  .sheet{ background:#fff; width:8.5in; min-height:11in; margin:18px auto;
    padding:1in; position:relative; box-shadow:0 2px 14px rgba(0,0,0,.12);
    font-size:16pt; }
  .sheet.page1{ page-break-after:always; }

  /* Logo in header, top-left (matches original 2.19in width) */
  .logo{ position:absolute; top:0.5in; left:0.65in; width:2.19in; height:auto; }

  /* Sticker box, top-right */
  .sticker{ position:absolute; top:0.5in; right:0.7in;
    width:2.3in; height:1in; border:1px solid #444; border-radius:3px;
    display:flex; align-items:center; justify-content:center;
    color:#888; font-size:13pt; font-style:italic; }

  .head{ text-align:center; margin:0.95in 0 0.18in; }
  .head .t1{font-size:20pt; line-height:1.15;}
  .head .t2{font-size:18pt; line-height:1.15;}

  .daterow{display:flex; justify-content:flex-end; align-items:baseline; gap:6px; margin-bottom:10px;}
  .daterow input{border:none;border-bottom:1px dotted #555; font:inherit; font-size:16pt;
    padding:0 6px; min-width:210px; text-align:center;}

  .field{margin-bottom:10px;}
  .field > .lbl{display:block; margin-bottom:2px;}
  .field textarea{ width:100%; border:1px solid #c9ced6; border-radius:6px; resize:vertical;
    font:inherit; font-size:16pt; line-height:1.85; padding:6px 8px; background:#fcfdff;
    background-image:repeating-linear-gradient(transparent,transparent 28px,#e3e7ee 28px,#e3e7ee 29px);
    background-attachment:local; }
  .field textarea:focus{outline:none;border-color:var(--accent);background:#fff;box-shadow:0 0 0 2px rgba(21,101,192,.12);}

  .footer-code{ position:absolute; left:1in; bottom:0.45in; font-size:11pt; color:var(--muted); }

  /* ---- Print: identical to original page setup ---- */
  @media print{
    @page{size:Letter; margin:0;}
    body{background:#fff;}
    .toolbar{display:none !important;}
    .sheet{box-shadow:none; margin:0; width:8.5in; height:11in; min-height:11in; padding:1in; overflow:hidden; }
    .field textarea{ border:none; background:#fff; padding:0 2px; overflow:hidden;
      resize:none;   /* removes the corner resize triangle on print */
      background-image:repeating-linear-gradient(transparent,transparent 28px,#cfcfcf 28px,#cfcfcf 29px); }
    .daterow input{min-width:210px;}
  }
</style>
</head>
<body>

<div class="toolbar">
  <h1>Adolescent Medicine – Follow up Case Form</h1>
  <button onclick="window.print()" class="primary">&#128424; Print / Save PDF</button>
  <button onclick="saveDraft()">&#128190; Save draft</button>
  <button onclick="loadDraft()">&#8617; Load draft</button>
  <button onclick="clearForm()">&#128465; Clear</button>
</div>
